name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/black --check src/ tests/
      - run: .venv/bin/isort --check src/ tests/
      - run: .venv/bin/flake8 src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/pytest tests/ -v --tb=short --cov=clauto_opt --cov-report=term-missing
